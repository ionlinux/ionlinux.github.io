baseURL = 'https://ionlinux.org/'
locale = 'en-us'
title = 'Ion Linux'

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[params]
  description = "A modern Linux distribution built for performance and simplicity."

  [params.theme]
    default = "dark"

  [params.navbar]
    displayTitle = true
    displayLogo = true

    [params.navbar.logo]
      path = "images/ion-logo.svg"

  [params.footer]
    displayCopyright = true
    displayPoweredBy = false

  [params.page]
    width = "wide"

[menu]
  [[menu.main]]
    name = "Features"
    pageRef = "/features"
    weight = 1
  [[menu.main]]
    name = "Docs"
    pageRef = "/docs"
    weight = 2
  [[menu.main]]
    name = "Download"
    pageRef = "/download"
    weight = 3
  [[menu.main]]
    name = "Blog"
    pageRef = "/blog"
    weight = 4

[markup.goldmark.renderer]
  unsafe = true
